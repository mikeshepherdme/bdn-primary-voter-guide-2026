<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Avatar Preview</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f5f3; padding: 40px; }
    h2 { font-size: 1rem; color: #444; margin: 0 0 8px; text-transform: uppercase; letter-spacing: 0.08em; }
    .row { display: flex; gap: 32px; flex-wrap: wrap; margin-bottom: 40px; }
    .swatch { text-align: center; }
    .swatch img { width: 96px; height: 96px; border-radius: 50%; background: #eaf4ec; display: block; }
    .swatch span { display: block; margin-top: 6px; font-size: 0.75rem; color: #777; }
  </style>
</head>
<body>
  <h2>Susan Collins — DiceBear styles</h2>
  <div class="row">
    <div class="swatch">
      <img src="https://api.dicebear.com/9.x/personas/svg?seed=SusanCollins" alt="personas">
      <span>personas</span>
    </div>
    <div class="swatch">
      <img src="https://api.dicebear.com/9.x/avataaars/svg?seed=SusanCollins" alt="avataaars">
      <span>avataaars</span>
    </div>
    <div class="swatch">
      <img src="https://api.dicebear.com/9.x/notionists/svg?seed=SusanCollins" alt="notionists">
      <span>notionists</span>
    </div>
    <div class="swatch">
      <img src="https://api.dicebear.com/9.x/lorelei/svg?seed=SusanCollins" alt="lorelei">
      <span>lorelei</span>
    </div>
    <div class="swatch">
      <img src="https://api.dicebear.com/9.x/adventurer/svg?seed=SusanCollins" alt="adventurer">
      <span>adventurer</span>
    </div>
    <div class="swatch">
      <img src="https://api.dicebear.com/9.x/big-ears/svg?seed=SusanCollins" alt="big-ears">
      <span>big-ears</span>
    </div>
  </div>
</body>
</html>
